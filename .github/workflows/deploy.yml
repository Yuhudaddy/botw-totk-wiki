name: 部署攻略 Wiki（Astro）

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'  # 每天台灣時間 10:00 自動重建
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，不取消進行中的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 設定 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 抓取 YouTube 熱門影片
        run: node scripts/fetch-youtube.mjs
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: 建置 Astro 站台
        run: npm run build

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上傳 Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
