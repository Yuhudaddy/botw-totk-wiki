name: 部署攻略 Wiki（Astro）

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，不取消進行中的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v4

      - name: 建置 Astro 站台
        uses: withastro/action@v3
        with:
          node-version: 22 # Astro 6 需 Node >=22.12，action 預設的 20 會失敗
        # 讀 package.json 的 build 腳本，輸出 ./dist，並自動上傳為 Pages artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
