site_name: 曠野・王國攻略 Wiki
site_description: 薩爾達傳說 曠野之息(BotW) / 王國之淚(TotK) 技巧與 Glitch 攻略，整理自 Yuhudaddy 的 YouTube 頻道。
site_author: Yuhudaddy
site_url: https://yuhudaddy.github.io/botw-totk-wiki/

repo_url: https://github.com/Yuhudaddy/botw-totk-wiki
repo_name: Yuhudaddy/botw-totk-wiki
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Yuhudaddy ・ 內容整理自個人 YouTube 頻道

theme:
  name: material
  language: zh-TW
  icon:
    logo: material/sword-cross
    repo: fontawesome/brands/github
    edit: material/pencil
    tag:
      default: material/tag
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切換到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切換到淺色模式
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.code.copy
    - content.tooltips

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search:
      separator: '[\s　 \-\.,，。、；：！？（）()「」【】]+'
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@zb_yuhudaddy
      name: YouTube 頻道
    - icon: fontawesome/brands/github
      link: https://github.com/Yuhudaddy
      name: GitHub
  generator: false

nav:
  - 首頁: index.md
  - 曠野之息 BotW:
      - botw/index.md
      - 過場必殺劍:
          - botw/cutscene-obliterator/index.md
          - 過場必殺劍 取得詳解: botw/cutscene-obliterator/cutscene-one-hit-obliterator.md
  - 王國之淚 TotK:
      - totk/index.md
      - 虛化裝備 Void Dip:
          - totk/void-dip-di/index.md
          - 原理與常用步驟: totk/void-dip-di/void-dip-di-basics.md
      - 餘料儲存 Fuse Storage:
          - totk/fuse-storage/index.md
          - 餘料儲存 基礎: totk/fuse-storage/fuse-storage-basics.md
  - 影片總覽: videos.md
  - 標籤索引: tags.md
  - 關於:
      - about.md
      - 如何新增攻略: how-to-add.md
